name: Build N5 Pro Ubuntu Core 24 Image

on:
  push:
    branches: [main]
    paths:
      - 'model-assertion/**'
      - 'gadget/**'
      - 'snaps/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      grade:
        description: 'Image grade (dangerous/signed)'
        required: true
        default: 'dangerous'
        type: choice
        options:
          - dangerous
          - signed

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      SNAP_GNUPG_HOME: /home/runner/.snap/gnupg
      GNUPGHOME: /home/runner/.snap/gnupg
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ubuntu-image
        run: |
          sudo snap install ubuntu-image --classic

      - name: Import signing key
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SNAP_GNUPG_TAR_B64: ${{ secrets.SNAP_GNUPG_TAR_B64 }}
          SIGNING_KEY_NAME: ${{ secrets.SIGNING_KEY_NAME }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p "$SNAP_GNUPG_HOME"
          chmod 700 "$SNAP_GNUPG_HOME"

          if [ -n "${SNAP_GNUPG_TAR_B64:-}" ]; then
            echo "$SNAP_GNUPG_TAR_B64" | base64 -d > /tmp/snap-gnupg.tar
            tar -xf /tmp/snap-gnupg.tar -C /home/runner
            chmod 700 "$SNAP_GNUPG_HOME"
          elif [ -n "${SIGNING_KEY:-}" ]; then
            # Backward-compatible path: import ASCII-armored key material.
            # Note: this may not create snap-managed key names in `snap keys`.
            echo "$SIGNING_KEY" | gpg --homedir "$SNAP_GNUPG_HOME" --batch --yes --import
            fingerprint=$(gpg --homedir "$SNAP_GNUPG_HOME" --list-secret-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')
            if [ -n "$fingerprint" ]; then
              echo "$fingerprint:6:" | gpg --homedir "$SNAP_GNUPG_HOME" --batch --import-ownertrust
            fi
          else
            echo "error: set either SIGNING_KEY or SNAP_GNUPG_TAR_B64 secret" >&2
            exit 1
          fi

          # Normalize agent config for Linux runners (remove host-specific pinentry path)
          touch "$SNAP_GNUPG_HOME/gpg-agent.conf"
          sed -i '/^pinentry-program /d' "$SNAP_GNUPG_HOME/gpg-agent.conf"
          grep -qx 'allow-loopback-pinentry' "$SNAP_GNUPG_HOME/gpg-agent.conf" || echo 'allow-loopback-pinentry' >> "$SNAP_GNUPG_HOME/gpg-agent.conf"
          grep -qx 'allow-preset-passphrase' "$SNAP_GNUPG_HOME/gpg-agent.conf" || echo 'allow-preset-passphrase' >> "$SNAP_GNUPG_HOME/gpg-agent.conf"
          gpgconf --homedir "$SNAP_GNUPG_HOME" --kill gpg-agent || true
          gpgconf --homedir "$SNAP_GNUPG_HOME" --launch gpg-agent

          # If key is passphrase-protected, preload passphrase so snap sign can run non-interactively.
          keygrip=$(gpg --homedir "$SNAP_GNUPG_HOME" --with-keygrip --list-secret-keys --with-colons | awk -F: '/^grp:/ {print $10; exit}')
          preset_cmd="$(command -v gpg-preset-passphrase || true)"
          if [ -z "$preset_cmd" ] && [ -x /usr/lib/gnupg/gpg-preset-passphrase ]; then
            preset_cmd=/usr/lib/gnupg/gpg-preset-passphrase
          fi
          if [ -z "$preset_cmd" ] && [ -x /usr/lib/gnupg2/gpg-preset-passphrase ]; then
            preset_cmd=/usr/lib/gnupg2/gpg-preset-passphrase
          fi
          if [ -n "${GPG_PASSPHRASE:-}" ] && [ -n "$keygrip" ] && [ -n "$preset_cmd" ]; then
            "$preset_cmd" --preset --passphrase "$GPG_PASSPHRASE" "$keygrip"
            echo "preloaded key passphrase into gpg-agent"
          fi

          echo "=== snap keys ==="
          snap keys || true

          resolved_key_name="${SIGNING_KEY_NAME:-$(snap keys | awk 'NR>1 {print $1; exit}')}"
          if [ -z "$resolved_key_name" ]; then
            echo "error: no snap key name available for signing." >&2
            echo "hint: provide SNAP_GNUPG_TAR_B64 (tar of ~/.snap/gnupg) and SIGNING_KEY_NAME secret." >&2
            exit 1
          fi
          echo "SIGNING_KEY_NAME_RESOLVED=$resolved_key_name" >> "$GITHUB_ENV"

      - name: Sign model assertion
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
          GRADE: ${{ github.event.inputs.grade || 'dangerous' }}
        run: |
          cd model-assertion
          # Inject secrets into the model template
          sed -i "s|__DEVELOPER_ID__|$DEVELOPER_ID|g" n5pro-model.json
          sed -i "s|__TIMESTAMP__|$(date -Iseconds --utc)|g" n5pro-model.json
          sed -i "s|__GRADE__|$GRADE|g" n5pro-model.json
          
          # Sign it
          cat n5pro-model.json | SNAP_GNUPG_HOME="$SNAP_GNUPG_HOME" snap sign -k "$SIGNING_KEY_NAME_RESOLVED" > n5pro.model
          
          echo "=== Signed Model Assertion ==="
          cat n5pro.model

      - name: Build Ubuntu Core image
        run: |
          cd model-assertion
          
          # Build command - add any custom snaps from ../snaps/
          cmd="ubuntu-image snap n5pro.model --validation=enforce --output-dir ../build"
          
          # Add any local snaps if they exist
          for snap in ../snaps/*.snap; do
            if [ -f "$snap" ]; then
              cmd="$cmd --snap $snap"
            fi
          done
          
          echo "Running: $cmd"
          eval $cmd

      - name: Compress image artifact
        run: |
          cd build
          ls -lh *.img
          # Compress for faster download (optional)
          xz -T0 -v *.img || true

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-core-24-n5pro-${{ github.run_number }}
          path: build/*.img*
          retention-days: 7

      - name: Create release with image
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "N5 Pro Ubuntu Core 24 Build #${{ github.run_number }}"
          body: |
            Custom Ubuntu Core 24 image for Minisforum N5 Pro
            
            **Grade:** ${{ github.event.inputs.grade || 'dangerous' }}
            **Built:** ${{ github.sha }}
            
            ## Pre-installed snaps
            - pc (gadget)
            - pc-kernel
            - core24
            - snapd
            - console-conf (for initial setup)
            
            ## Usage
            1. Download the `.img.xz` artifact
            2. Decompress: `unxz ubuntu-core-24-*.img.xz`
            3. Write to USB: `sudo dd if=*.img of=/dev/sdX bs=4M status=progress`
            4. Boot N5 Pro from USB, install to NVMe
          files: build/*.img*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}