name: example-helpers
title: N5 Example Helpers
version: '1.0'
summary: Example helper scripts for Ubuntu Core 24 on N5 Pro
description: |
  This snap provides example helper scripts for common system administration
  tasks on Ubuntu Core 24. Customize for your needs by modifying the scripts
  and rebuilding.
license: GPL-3.0-only
contact: https://github.com/jasonkolodziej/n5-ubuntu/issues
issues: https://github.com/jasonkolodziej/n5-ubuntu/issues
source-code: https://github.com/jasonkolodziej/n5-ubuntu
website: https://github.com/jasonkolodziej/n5-ubuntu
donation: https://github.com/sponsors

base: core24
confinement: strict

parts:
  scripts:
    plugin: dump
    source: .
    organize:
      bin/* : bin/
      hooks/* : hooks/

apps:
  setup-storage:
    command: bin/setup-storage.sh
    plugs:
      - system-observe
      - hardware-observe

  configure-network:
    command: bin/configure-network.sh
    plugs:
      - network
      - network-observe

  networking-state:
    command: bin/networking-state.sh
    plugs:
      - network-observe
      - system-observe
      - home

  storage-inventory:
    command: bin/storage-inventory.sh
    plugs:
      - network
      - hardware-observe
      - system-observe
      - home

hooks:
  install:
    plugs:
      - system-observe
  configure:
    plugs:
      - system-observe
