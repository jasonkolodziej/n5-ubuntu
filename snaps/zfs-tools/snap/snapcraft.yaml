name: zfs-tools
title: N5 ZFS Tools
version: '1.0'
summary: ZFS userspace tools and bootstrap helpers for Ubuntu Core 24
description: |
  This snap ships ZFS userspace commands and helper scripts for initializing
  and validating data pools on Ubuntu Core 24 images for the N5 Pro.
  It is intended for local, dangerous image builds where devmode snaps are
  acceptable for storage bootstrap tasks.
license: GPL-2.0-only
contact: https://github.com/jasonkolodziej/n5-ubuntu/issues
issues: https://github.com/jasonkolodziej/n5-ubuntu/issues
source-code: https://github.com/jasonkolodziej/n5-ubuntu
website: https://github.com/jasonkolodziej/n5-ubuntu

base: core24
confinement: devmode
grade: devel

plugs:
  mount-control:
    interface: mount-control

apps:
  auto-init:
    command: bin/auto-init.sh
    plugs:
      - mount-control
      - system-observe
  init-pool:
    command: bin/init-pool.sh
    plugs:
      - mount-control
  status:
    command: bin/status.sh

parts:
  scripts:
    plugin: dump
    source: .
    organize:
      bin/* : bin/
      hooks/* : hooks/

  zfs-userspace:
    plugin: nil
    # Don't declare stage-packages here—we extract manually in override-pull
    # to avoid snapcraft's xattr handling on GitHub Actions overlayfs
    override-pull: |
      # Download .debs manually and extract without xattrs
      mkdir -p "$SNAPCRAFT_PART_SRC/debs"
      mkdir -p "$SNAPCRAFT_PART_SRC/extract-root"
      cd "$SNAPCRAFT_PART_SRC/debs"

      apt-get update >/dev/null 2>&1 || true
      apt-get download zfsutils-linux libzfs4linux libzpool5linux libnvpair3linux libuutil3linux 2>/dev/null || true

      # Extract each .deb without xattrs using tar --no-xattrs
      for deb in *.deb; do
        if [ -f "$deb" ]; then
          mkdir -p work && cd work
          # ar extracts the .deb members
          ar x "../$deb" 2>/dev/null || true
          # Find and extract data tar without xattr flags
          data_tar=$(ls data.tar* 2>/dev/null | head -1)
          if [ -n "$data_tar" ]; then
            if [[ "$data_tar" == *.zst ]]; then
              tar --no-xattrs -xf "$data_tar" -C "$SNAPCRAFT_PART_SRC/extract-root"
            elif [[ "$data_tar" == *.gz ]]; then
              tar --no-xattrs -xzf "$data_tar" -C "$SNAPCRAFT_PART_SRC/extract-root"
            elif [[ "$data_tar" == *.xz ]]; then
              tar --no-xattrs -xJf "$data_tar" -C "$SNAPCRAFT_PART_SRC/extract-root"
            else
              tar --no-xattrs -xf "$data_tar" -C "$SNAPCRAFT_PART_SRC/extract-root"
            fi
          fi
          cd ..
          rm -rf work
        fi
      done
    override-build: |
      # Move extracted files to install
      mkdir -p "$SNAPCRAFT_PART_INSTALL"
      [ -d "$SNAPCRAFT_PART_SRC/extract-root/usr" ] && cp -r "$SNAPCRAFT_PART_SRC/extract-root/usr" "$SNAPCRAFT_PART_INSTALL/" || true
      [ -d "$SNAPCRAFT_PART_SRC/extract-root/sbin" ] && cp -r "$SNAPCRAFT_PART_SRC/extract-root/sbin" "$SNAPCRAFT_PART_INSTALL/" || true
      [ -d "$SNAPCRAFT_PART_SRC/extract-root/etc" ] && cp -r "$SNAPCRAFT_PART_SRC/extract-root/etc" "$SNAPCRAFT_PART_INSTALL/" || true
      # Ensure prime paths exist regardless of package layout.
      mkdir -p "$SNAPCRAFT_PART_INSTALL/usr/sbin"
      [ -x "$SNAPCRAFT_PART_INSTALL/sbin/zfs" ] && cp "$SNAPCRAFT_PART_INSTALL/sbin/zfs" "$SNAPCRAFT_PART_INSTALL/usr/sbin/zfs" || true
      [ -x "$SNAPCRAFT_PART_INSTALL/sbin/zpool" ] && cp "$SNAPCRAFT_PART_INSTALL/sbin/zpool" "$SNAPCRAFT_PART_INSTALL/usr/sbin/zpool" || true
    prime:
      - usr/sbin/zpool
      - usr/sbin/zfs
      - sbin/zpool
      - sbin/zfs
      - usr/lib/x86_64-linux-gnu/libzfs.so*
      - usr/lib/x86_64-linux-gnu/libzpool.so*
      - usr/lib/x86_64-linux-gnu/libnvpair.so*
      - usr/lib/x86_64-linux-gnu/libuutil.so*
