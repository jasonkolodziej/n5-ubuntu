name: zfs-tools
title: N5 ZFS Tools
version: '1.0'
summary: ZFS userspace tools and bootstrap helpers for Ubuntu Core 24
description: |
  This snap ships ZFS userspace commands and helper scripts for initializing
  and validating data pools on Ubuntu Core 24 images for the N5 Pro.
  It is intended for local, dangerous image builds where devmode snaps are
  acceptable for storage bootstrap tasks.
license: GPL-2.0-only
contact: https://github.com/jasonkolodziej/n5-ubuntu/issues
issues: https://github.com/jasonkolodziej/n5-ubuntu/issues
source-code: https://github.com/jasonkolodziej/n5-ubuntu
website: https://github.com/jasonkolodziej/n5-ubuntu

base: core24
confinement: devmode
grade: devel

parts:
  scripts:
    plugin: dump
    source: .
    organize:
      bin/* : bin/
      hooks/* : hooks/

  zfs-userspace:
    plugin: nil
    stage-packages:
      - libzfs4linux
      - libzpool5linux
      - libnvpair3linux
      - libuutil3linux
    override-build: |
      # Manually extract zfsutils-linux binaries with --no-xattrs to avoid GitHub Actions xattr errors
      mkdir -p "$SNAPCRAFT_PART_INSTALL/usr/sbin"
      cd /tmp
      apt-get update >/dev/null 2>&1 || true
      apt-get download zfsutils-linux >/dev/null 2>&1 && {
        deb=$(ls zfsutils-linux*.deb 2>/dev/null | head -1)
        if [ -n "$deb" ] && [ -f "$deb" ]; then
          # Extract .deb (which is an ar archive) using dpkg-deb
          # This properly extracts without attempting to write extended attributes
          dpkg-deb -x "$deb" "$SNAPCRAFT_PART_INSTALL" 2>/dev/null || true
          rm -f "$deb"
        fi
      } || true
      
      # Clean up system files not needed in snap
      rm -rf "$SNAPCRAFT_PART_INSTALL/etc" || true
      rm -rf "$SNAPCRAFT_PART_INSTALL/usr/share" || true
    stage:
      - usr/sbin/zpool
      - usr/sbin/zfs
      - usr/lib/x86_64-linux-gnu/libzfs.so*
      - usr/lib/x86_64-linux-gnu/libzpool.so*
      - usr/lib/x86_64-linux-gnu/libnvpair.so*
      - usr/lib/x86_64-linux-gnu/libuutil.so*
    prime:
      - usr/sbin/zpool
      - usr/sbin/zfs
      - usr/lib/x86_64-linux-gnu/libzfs.so*
      - usr/lib/x86_64-linux-gnu/libzpool.so*
      - usr/lib/x86_64-linux-gnu/libnvpair.so*
      - usr/lib/x86_64-linux-gnu/libuutil.so*

apps:
  zpool:
    command: usr/sbin/zpool
    plugs:
      - block-devices
      - hardware-observe
      - mount-observe
      - system-observe

  zfs:
    command: usr/sbin/zfs
    plugs:
      - block-devices
      - hardware-observe
      - mount-observe
      - system-observe

  status:
    command: bin/status.sh
    plugs:
      - block-devices
      - hardware-observe
      - mount-observe
      - system-observe

  init-pool:
    command: bin/init-pool.sh
    plugs:
      - block-devices
      - hardware-observe
      - mount-observe
      - system-observe

  auto-init:
    command: bin/auto-init.sh
    daemon: simple
    restart-condition: on-failure
    plugs:
      - block-devices
      - hardware-observe
      - mount-observe
      - system-observe

hooks:
  install:
    plugs:
      - system-observe
  configure:
    plugs:
      - block-devices
      - hardware-observe
      - mount-observe
      - system-observe
